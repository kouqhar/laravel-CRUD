# fly.toml app configuration file generated for your Laravel App

app = 'my-laravel-chirper'
primary_region = 'lhr'

[build]
  [build.args]
    NODE_VERSION = '20'
    PHP_VERSION = '8.3'

[env]
  APP_ENV = 'production'
  APP_DEBUG = false
  LOG_CHANNEL = 'stderr'

  # Point this directly inside our mounted persistent volume block
  DB_CONNECTION = 'sqlite'
  DB_DATABASE = '/var/www/html/storage/database/database.sqlite'

  # Optimization flags for web serving
  SESSION_DRIVER = 'cookie'
  BCRYPT_ROUNDS = '12'

[[mounts]]
  source = 'lab_db_volume'
  destination = '/var/www/html/storage/database'
  initial_size = '1GB'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off' # Keeps your app awake 24/7 on the free tier
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

# Cache configurations for static frontend performance asset mapping
[[statics]]
  guest_path = '/var/www/html/public'
  url_prefix = '/'
